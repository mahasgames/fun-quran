name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the project files
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Capacitor
        run: npm install

      - name: Create the Android project
        run: npx cap add android

      - name: Copy your web files into it
        run: npx cap sync android

      - name: Generate the app icon
        run: npx capacitor-assets generate --android

      - name: Build the release APK (unsigned)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Decode the keystore from secrets
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Align and sign the APK
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          echo "Using build-tools at: $BUILD_TOOLS"

          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk

          "$BUILD_TOOLS/zipalign" -v -f -p 4 "$UNSIGNED" "$RUNNER_TEMP/app-aligned.apk"

          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --out "$RUNNER_TEMP/Fun-Quran.apk" \
            "$RUNNER_TEMP/app-aligned.apk"

          echo "Verifying signature..."
          "$BUILD_TOOLS/apksigner" verify --verbose "$RUNNER_TEMP/Fun-Quran.apk"

      - name: Make the signed APK downloadable
        uses: actions/upload-artifact@v6
        with:
          name: Fun-Quran-Release-APK
          path: ${{ runner.temp }}/Fun-Quran.apk
          if-no-files-found: error
