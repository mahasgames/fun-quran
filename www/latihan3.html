    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idxNomor = urlParams.get('nomor');
        //var audio_dep = new Audio('audio/audio_1_'+idxHuruf+'_dep.mp3');
        //var audio_ten = new Audio('audio/audio_1_'+idxHuruf+'_ten.mp3');
        //var audio_bel = new Audio('audio/audio_1_'+idxHuruf+'_bel.mp3');
        //var audione = new Audio('audio/audio_1_'+idxHuruf+'.ogg');
        document.addEventListener('backbutton', function(){
            location.href='listmateri3.html';
        });

        const minSoal=1;
        const maxSoal=2;
        var pP = Number(idxNomor)-1;
        var nP = Number(idxNomor)+1;
        var nX = Number(maxSoal)+1;
        if(idxNomor>minSoal){
            var prevPage = "latihan3.html?nomor="+pP;
        } else {
            var prevPage = "#";
        }
        if(idxNomor<maxSoal+1){
            var nextPage = "latihan3.html?nomor="+nP;
        } else {
            var nextPage = "#";
        }

        var pil=[];
        if(idxNomor=="1"){ 
            soal="audio";
            pil[0]="ءُ";
            pil[1]="عُ";
            kunci="0";
            //if(!localStorage.getItem("jawab_1")){
                localStorage.setItem("jawab_1","0");
            //}
            //if(!localStorage.getItem("jawab_2")){
                localStorage.setItem("jawab_2","0");
            //}
            //if(!localStorage.getItem("jawab_3")){
                //localStorage.setItem("jawab_3","0");
            //}
        };
        if(idxNomor=="2"){ 
            soal="audio";
            pil[0]="ضِ";
            pil[1]="صِ";
            kunci="1";
        };
        //if(idxNomor=="3"){ 
        //    soal="Manakah  tulisan huruf <span class='fs-3'><font color='red'> اَ  </font></span> di tengah?";
        //    pil[0]=" لَاَيَةَ";
        //    pil[1]=" فَلَحَ";
        //    kunci="1";
        //};
        if(idxNomor==nX){ 
            soal="Latihan selesai.";
            pil[0]="";
            pil[1]="";
            kunci="";
        };
        nilaiBenar = Number(localStorage.getItem("jawab_1"))+Number(localStorage.getItem("jawab_2"))+Number(localStorage.getItem("jawab_3"));
      //console.log(greetingValue);  
    </script>
</head>

<body style="background-color: #f9fff9;">

        </div>
        <div class="pageTitle">Fun Qur'an</div>
        <div class="right"></div>
    </div>
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule" class="full-height">
        <div class="section full mt-4 mb-4 text-center">
            <h3>Harokat</h3>
            <h2>Latihan</h2>
            <script>
                if(idxNomor<maxSoal+1)
                    document.write("Jawaban Benar: "+nilaiBenar+"/"+maxSoal);
            </script>
        </div>
        <div class="section mt-2">
            <div class="card">
                <div class="card-header fs-6">
                    <script>
                        if(idxNomor<maxSoal+1){
                            if(soal=="audio"){
                                var audione = new Audio('audio/latihan_3_'+idxNomor+'.ogg');
                                document.write(idxNomor+". Soal nomor ini dalam bentuk audio. Klik tombol untuk mendengarkan: ");
                                document.write("<a href='#'' type='button' class='btn btn-icon btn-primary shadowed' onclick='audione.play();'><ion-icon name='volume-high-outline'></ion-icon></a><br />");
                            } else {
                                document.write(idxNomor+". "+soal);
                            }
                        } else {
                            document.write(soal);
                        }
                    </script>
                </div>
                <div class="card-body text-center">
                    <div class="input-list" id="inputLatihan">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="radioList" id="radioList1" value=0>
                            <label class="form-check-label fs-1" for="radioList1">
                                <script>
                                    document.write(pil[0]);
                                </script>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="radioList" id="radioList2" value=1>
                            <label class="form-check-label fs-1" for="radioList2">
                                <script>
                                    document.write(pil[1]);
                                </script>
                            </label>
                        </div>
                    </div>
                    <!--<p class="card-text">With supporting text below as a natural lead-in to additional content.</p>-->
                    <!--
                    <a href="#" type="button" class="btn btn-primary rounded fs-6">
                    <ion-icon name="volume-high-outline"></ion-icon> Dengarkan</a>
                    -->
                </button>
                </div>
            </div>
        </div>
        <!--
        <div class="section full mt-4 mb-4 text-center">
            <a href="#" type="button" class="btn btn-primary rounded fs-5" onclick="audione.play();">
            <ion-icon name="volume-high-outline"></ion-icon> Dengarkan</a>
        </div>
        -->
        <div class="section full mt-4 mb-4 text-center" id="tombolCekJawaban">
            <a href="#" type="button" class="btn btn-primary shadowed" onclick="cekJawaban();">
            <ion-icon name="help-outline"></ion-icon>Cek Jawaban</a><br />
        </div>

        <!-- top left -->

        </div>
        -->
        <!-- * top left -->

        <!-- top right -->
        <div class="fab-button animate top-right invisible">

        <!-- DialogIconedSuccess -->
        <div class="modal fade dialogbox" id="DialogIconedSuccess" data-bs-backdrop="static" tabindex="-1"
            role="dialog">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-icon text-success">
                        <ion-icon name="checkmark-circle"></ion-icon>
                    </div>
                    <div class="modal-header">
                        <h5 class="modal-title">Jawaban benar!</h5>
                    </div>
                    <div class="modal-body">
                    </div>
                    <div class="modal-footer">
                        <div class="btn-inline">
                            <a href="#" class="btn" data-bs-dismiss="modal" onclick="document.getElementById('nextP').click();">OK</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- * DialogIconedSuccess -->

        <!-- DialogIconedDanger -->
        <div class="modal fade dialogbox" id="DialogIconedDanger" data-bs-backdrop="static" tabindex="-1" role="dialog">

                <div class="modal-content">

                    </div>
                    <div class="modal-body">
                        Jawaban yang benar adalah:<br /><br />
                        <span class="fs-1">
                            <script>
                                document.write(pil[kunci]);
                            </script>
                        </span>
                    </div>
                    <div class="modal-footer">
                        <div class="btn-inline">
                            <a href="#" class="btn" data-bs-dismiss="modal" onclick="document.getElementById('nextP').click();">OK</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script>
        //document.getElementById("prevP").href=prevPage;
        document.getElementById("nextP").href=nextPage;

        function cekJawaban(){
            var ele = document.getElementsByName('radioList');
 
            for (i = 0; i < ele.length; i++) {
                if (ele[i].checked){
                    pilJawaban = i;
                }            
            }

            if(pilJawaban==kunci){
                var myModal = new bootstrap.Modal(document.getElementById('DialogIconedSuccess'), {
                  keyboard: false
                })
                myModal.show();
                if(idxNomor=="1"){
                    localStorage.setItem("jawab_1","1");
                }
                if(idxNomor=="2"){
                    localStorage.setItem("jawab_2","1");
                }
                if(idxNomor=="3"){
                    localStorage.setItem("jawab_3","1");
                }

            } else {
                var myModal = new bootstrap.Modal(document.getElementById('DialogIconedDanger'), {
                  keyboard: false
                })
                myModal.show();
            }
        }
        if(idxNomor==nX){ 
            document.getElementById('inputLatihan').innerHTML="<span class='fs-4'>Menjawab benar:</span><br/><br/><span class='fs-3'>"+nilaiBenar+" dari "+maxSoal+" soal</span>";
            document.getElementById('tombolCekJawaban').innerHTML="<br /><a href='listmateri3.html' type='button' class='btn btn-primary shadowed'><ion-icon name='layers-outline'></ion-icon>Kembali ke materi</a><br />";
        };

    </script>
